<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>청렴 신고 사건 조회 및 정책 동향</title>
  <link rel="stylesheet" href="./style.css">
</head>
<body>
  <main class="shell">
    <section class="hero">
      <div>
        <p class="eyebrow">행안부 청렴감사관실 공개 안내</p>
        <h1>청렴 신고 사건 조회와 최신 정책 동향</h1>
        <p class="lead">신고유형과 처리상태로 빠르게 필터링하고, 청렴 교육 현황과 행안부 보도자료도 함께 확인할 수 있습니다.</p>
      </div>
      <div class="stats">
        <div class="stat"><span>총 사건</span><strong id="totalCases">0</strong></div>
        <div class="stat"><span>교육기관</span><strong id="totalInstitutions">0</strong></div>
        <div class="stat"><span>우수기관</span><strong id="excellentInstitutions">0</strong></div>
      </div>
    </section>

    <section class="panel controls">
      <label>
        <span>신고유형</span>
        <select id="typeFilter"></select>
      </label>
      <label>
        <span>처리상태</span>
        <select id="statusFilter"></select>
      </label>
      <div class="result-count" id="resultCount">결과0건</div>
    </section>

    <section class="panel">
      <div class="section-head">
        <h2>신고 사건</h2>
        <p>카드 형식으로 최근 신고 사건을 확인합니다.</p>
      </div>
      <div id="cards" class="cards"></div>
    </section>

    <section class="grid">
      <section class="panel">
        <div class="section-head">
          <h2>청렴 교육 현황</h2>
          <p>JSON으로 정리된 교육 데이터 요약</p>
        </div>
        <div id="eduSummary" class="edu-summary"></div>
      </section>
      <section class="panel">
        <div class="section-head">
          <h2>행안부 보도자료 RSS</h2>
          <p>최신 정책 동향 5건 이상을 실시간 표시</p>
        </div>
        <div id="rssStatus" class="muted">RSS를 불러오는 중입니다.</div>
        <ul id="rssList" class="rss-list"></ul>
      </section>
    </section>
  </main>
  <script src="./app.js"></script>
</body>
</html>
