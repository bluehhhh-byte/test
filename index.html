<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>청렴 신고 사건 조회 및 정책 동향</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Pretendard:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="./style.css">
</head>
<body>
  <div class="bg-orb bg-orb-a"></div>
  <div class="bg-orb bg-orb-b"></div>
  <main class="shell">
    <section class="hero">
      <div class="hero-copy">
        <p class="eyebrow">행안부 청렴감사관실 공개 안내</p>
        <h1>청렴 신고 사건 조회와 최신 정책 동향</h1>
        <p class="lead">신고유형과 처리상태로 빠르게 필터링하고, 청렴 교육 현황과 행안부 보도자료도 함께 확인할 수 있습니다.</p>
        <div class="hero-badges" aria-label="주요 기능">
          <span>실시간 필터</span>
          <span>교육 현황 요약</span>
          <span>정책 RSS</span>
        </div>
      </div>
      <div class="stats panel">
        <div class="stat"><span>이번 달 사건</span><strong id="totalCases">0</strong></div>
        <div class="stat"><span>교육 이수율 평균</span><strong id="avgEduRate">0</strong></div>
        <div class="stat"><span>우수기관 비율</span><strong id="excellentRate">0</strong></div>
      </div>
    </section>

    <section class="panel controls" aria-label="검색 필터">
      <div class="filter-field">
        <label for="typeFilter">신고유형</label>
        <select id="typeFilter"></select>
      </div>
      <div class="filter-field">
        <label for="statusFilter">처리상태</label>
        <select id="statusFilter"></select>
      </div>
      <div class="result-count" id="resultCount" aria-live="polite">결과 0건</div>
    </section>

    <section class="panel">
      <div class="section-head section-head-inline">
        <div>
          <h2>신고 사건</h2>
          <p>카드 형식으로 최근 신고 사건을 확인합니다.</p>
        </div>
        <span class="section-note">조건 변경 시 즉시 반영</span>
      </div>
      <div id="cards" class="cards"></div>
    </section>

    <section class="grid">
      <section class="panel">
        <div class="section-head">
          <h2>청렴 교육 현황</h2>
          <p>데이터 요약</p>
        </div>
        <div id="eduSummary" class="edu-summary"></div>
      </section>
      <section class="panel">
        <div class="section-head">
          <h2>행안부 보도자료 RSS</h2>
          <p>최신 정책 동향 5건 이상 표시</p>
        </div>
        <div id="rssStatus" class="muted">RSS를 불러오는 중입니다.</div>
        <ul id="rssList" class="rss-list"></ul>
      </section>
    </section>
  </main>
  <script src="./data.js"></script>
  <script src="./rss-data.js"></script>
  <script src="./app.js"></script>
</body>
</html>
